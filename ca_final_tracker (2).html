<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f1117">
<title>CA Final Tracker</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: rgba(255,255,255,0.08);
    --text: #f0f0f0;
    --muted: #7a7d8e;
    --accent: #4f8ef7;
    --accent-dim: rgba(79,142,247,0.15);
    --green: #34c77b;
    --green-dim: rgba(52,199,123,0.15);
    --amber: #f5a623;
    --amber-dim: rgba(245,166,35,0.15);
    --red: #e05252;
    --radius: 16px;
    --radius-sm: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow: hidden; }

  /* Layout */
  #app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
  #header { padding: 52px 20px 16px; flex-shrink: 0; }
  #header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  #header p { font-size: 13px; color: var(--muted); margin-top: 2px; }
  #content { flex: 1; overflow-y: auto; padding: 0 16px 160px; -webkit-overflow-scrolling: touch; }
  #nav { position: fixed; bottom: 56px; left: 0; right: 0; background: rgba(15,17,23,0.98); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-top: 0.5px solid var(--border); border-bottom: 0.5px solid var(--border); display: flex; padding: 10px 0; z-index: 100; }
  .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; background: none; border: none; color: var(--muted); font-size: 10px; font-weight: 500; cursor: pointer; padding: 4px 0; transition: color 0.15s; }
  .nav-btn.active { color: var(--accent); }
  .nav-icon { font-size: 22px; line-height: 1; }

  /* Pages */
  .page { display: none; }
  .page.active { display: block; }

  /* Timer page */
  .subj-scroll { display: flex; gap: 10px; overflow-x: auto; padding: 4px 0 12px; scrollbar-width: none; }
  .subj-scroll::-webkit-scrollbar { display: none; }
  .subj-chip { flex-shrink: 0; padding: 8px 16px; border-radius: 30px; font-size: 13px; font-weight: 600; border: 1.5px solid transparent; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .subj-chip.selected { border-color: currentColor; background: rgba(255,255,255,0.08); }

  .timer-card { background: var(--surface); border-radius: var(--radius); padding: 32px 20px 24px; text-align: center; margin-bottom: 16px; border: 0.5px solid var(--border); }
  .timer-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
  .timer-num { font-size: 64px; font-weight: 300; letter-spacing: -2px; font-variant-numeric: tabular-nums; line-height: 1; }
  .timer-subj { font-size: 14px; color: var(--muted); margin-top: 10px; min-height: 20px; }

  .btn-row { display: flex; gap: 12px; justify-content: center; margin-top: 24px; }
  .btn-primary { background: var(--accent); color: #fff; border: none; border-radius: 30px; padding: 14px 40px; font-size: 16px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
  .btn-primary:active { opacity: 0.8; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 0.5px solid var(--border); border-radius: 30px; padding: 14px 24px; font-size: 16px; cursor: pointer; }
  .btn-secondary:active { opacity: 0.7; }

  .section-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin: 20px 0 10px; }
  .log-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 0.5px solid var(--border); }
  .log-left { display: flex; align-items: center; gap: 10px; }
  .log-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .log-name { font-size: 14px; font-weight: 500; }
  .log-right { font-size: 13px; color: var(--muted); }
  .empty-msg { text-align: center; padding: 24px 0; color: var(--muted); font-size: 14px; }

  /* Planner page */
  .date-bar { background: var(--accent-dim); border: 0.5px solid rgba(79,142,247,0.3); border-radius: var(--radius-sm); padding: 10px 14px; font-size: 13px; font-weight: 600; color: var(--accent); margin-bottom: 16px; }
  .plan-item { background: var(--surface); border-radius: var(--radius-sm); padding: 14px; display: flex; align-items: center; gap: 12px; margin-bottom: 8px; border: 0.5px solid var(--border); transition: opacity 0.2s; }
  .plan-item.done { opacity: 0.45; }
  .check-box { width: 22px; height: 22px; border-radius: 6px; border: 1.5px solid var(--muted); display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: all 0.15s; }
  .check-box.checked { background: var(--green); border-color: var(--green); }
  .check-icon { color: #fff; font-size: 14px; font-weight: 700; }
  .plan-info { flex: 1; min-width: 0; }
  .plan-topic { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .plan-tag { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .plan-del { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; padding: 4px; }

  .add-box { background: var(--surface); border-radius: var(--radius); padding: 16px; border: 0.5px solid var(--border); margin-top: 16px; }
  .add-box select, .add-box input { width: 100%; background: var(--surface2); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; font-size: 14px; color: var(--text); margin-bottom: 10px; outline: none; -webkit-appearance: none; }
  .add-box select option { background: var(--surface2); }
  .add-box input::placeholder { color: var(--muted); }
  .btn-add { width: 100%; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); padding: 13px; font-size: 15px; font-weight: 600; cursor: pointer; }
  .btn-add:active { opacity: 0.8; }

  /* Stats page */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .stat-box { background: var(--surface); border-radius: var(--radius); padding: 16px; border: 0.5px solid var(--border); }
  .stat-val { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
  .stat-lbl { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .stat-val.green { color: var(--green); }
  .stat-val.accent { color: var(--accent); }
  .stat-val.amber { color: var(--amber); }

  .bar-item { margin-bottom: 14px; }
  .bar-top { display: flex; justify-content: space-between; margin-bottom: 5px; }
  .bar-name { font-size: 13px; font-weight: 500; }
  .bar-hrs { font-size: 12px; color: var(--muted); }
  .bar-track { height: 7px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 7px; border-radius: 4px; transition: width 0.5s ease; }

  /* Toast */
  #toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--surface2); color: var(--text); padding: 10px 20px; border-radius: 30px; font-size: 13px; font-weight: 500; opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 200; border: 0.5px solid var(--border); white-space: nowrap; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <h1>CA Final Tracker</h1>
    <p id="hdr-date"></p>
  </div>

  <div id="content">

    <!-- TIMER PAGE -->
    <div class="page active" id="page-timer">
      <div class="subj-scroll" id="subj-chips"></div>
      <div class="timer-card">
        <div class="timer-label">Study time</div>
        <div class="timer-num" id="timer-num">00:00:00</div>
        <div class="timer-subj" id="timer-subj">Select a subject below</div>
        <div class="btn-row">
          <button class="btn-primary" id="start-btn" onclick="toggleTimer()">Start</button>
          <button class="btn-secondary" onclick="resetTimer()" title="End session">End</button>
        </div>
      </div>
      <div class="section-label">Today's sessions</div>
      <div id="log-list"><div class="empty-msg">No sessions yet — start studying!</div></div>
    </div>

    <!-- PLANNER PAGE -->
    <div class="page" id="page-planner">
      <div class="date-bar" id="plan-date"></div>
      <div id="plan-list"></div>
      <div class="add-box">
        <select id="plan-subj"></select>
        <input id="plan-input" placeholder="Topic or chapter name" />
        <button class="btn-add" onclick="addPlan()">Add to today's plan</button>
      </div>
    </div>

    <!-- STATS PAGE -->
    <div class="page" id="page-stats">
      <div class="stats-grid" id="stat-cards"></div>

      <div class="section-label">Today's subject breakdown</div>
      <div id="today-bars" style="margin-bottom:20px;"></div>

      <div class="section-label">Daily hours — last 7 days</div>
      <div id="daily-chart" style="margin-bottom:20px;"></div>

      <div class="section-label">Day-wise detail</div>
      <div id="day-detail" style="margin-bottom:20px;"></div>

      <div class="section-label">All-time subject totals</div>
      <div id="bar-chart" style="margin-bottom:20px;"></div>

      <div style="margin-top:8px;">
        <button class="btn-secondary" style="width:100%;padding:13px;font-size:14px;border-radius:12px;" onclick="if(confirm('Reset all data?')){localStorage.clear();location.reload();}">Reset all data</button>
      </div>
    </div>

  </div><!-- /content -->

  <nav id="nav">
    <button class="nav-btn active" id="nav-timer" onclick="switchPage('timer')">
      <span class="nav-icon">⏱</span>Timer
    </button>
    <button class="nav-btn" id="nav-planner" onclick="switchPage('planner')">
      <span class="nav-icon">📋</span>Planner
    </button>
    <button class="nav-btn" id="nav-stats" onclick="switchPage('stats')">
      <span class="nav-icon">📊</span>Stats
    </button>
  </nav>
</div>

<div id="toast"></div>

<script>
const SUBJECTS = [
  {id:'fr',  name:'Financial Reporting',         short:'FR',    color:'#4f8ef7'},
  {id:'afm', name:'Adv. Financial Management',   short:'AFM',   color:'#34c77b'},
  {id:'aud', name:'Auditing',                    short:'Audit', color:'#f5a623'},
  {id:'dt',  name:'Direct Tax',                  short:'DT',    color:'#ff7b54'},
  {id:'idt', name:'Indirect Tax',                short:'IDT',   color:'#a3c96a'},
  {id:'ibs', name:'IBS',                         short:'IBS',   color:'#b57bee'},
];

let hours   = JSON.parse(localStorage.getItem('ca_hours')   || '{}');
let sessions= JSON.parse(localStorage.getItem('ca_sessions')|| '[]');
let plans   = JSON.parse(localStorage.getItem('ca_plans')   || '[]');
let selectedId = null, running = false, elapsed = 0, startTs = null, timerInt = null;

function save() {
  localStorage.setItem('ca_hours',    JSON.stringify(hours));
  localStorage.setItem('ca_sessions', JSON.stringify(sessions));
  localStorage.setItem('ca_plans',    JSON.stringify(plans));
}

function fmt(s) {
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
  return [h,m,sec].map(v=>String(v).padStart(2,'0')).join(':');
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2000);
}

// Header date
const now = new Date();
document.getElementById('hdr-date').textContent = now.toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
document.getElementById('plan-date').textContent = now.toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long'});

// Nav
function switchPage(name) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');
  if(name==='stats') renderStats();
}

// Subject chips
function renderChips() {
  document.getElementById('subj-chips').innerHTML = SUBJECTS.map(s=>`
    <div class="subj-chip${selectedId===s.id?' selected':''}"
         style="color:${s.color};border-color:${selectedId===s.id?s.color:'transparent'};background:${selectedId===s.id?s.color+'22':'transparent'}"
         onclick="selectSubj('${s.id}')">${s.short}</div>`).join('');
}

function selectSubj(id) {
  if(running) {
    // Auto-save current segment then switch
    clearInterval(timerInt);
    running = false;
    if(elapsed > 10) autoSave();
    elapsed = 0;
    document.getElementById('timer-num').textContent = '00:00:00';
    document.getElementById('start-btn').textContent = 'Start';
  }
  selectedId = id;
  const s = SUBJECTS.find(x=>x.id===id);
  document.getElementById('timer-subj').textContent = s.name;
  renderChips();
}

// Timer
function toggleTimer() {
  if(!selectedId) { toast("Pick a subject first"); return; }
  if(!running) {
    running = true;
    startTs = Date.now() - elapsed*1000;
    document.getElementById('start-btn').textContent = 'Pause';
    timerInt = setInterval(()=>{
      elapsed = Math.floor((Date.now()-startTs)/1000);
      document.getElementById('timer-num').textContent = fmt(elapsed);
    }, 500);
  } else {
    running = false; clearInterval(timerInt);
    document.getElementById('start-btn').textContent = 'Resume';
    // AUTO-SAVE on every pause
    if(elapsed > 10) autoSave();
  }
}

function autoSave() {
  if(!selectedId || elapsed < 10) return;
  const s = SUBJECTS.find(x=>x.id===selectedId);
  // Add to total hours
  hours[selectedId] = (hours[selectedId]||0) + elapsed;
  // Log session
  sessions.push({id:selectedId, secs:elapsed, time: new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})});
  // Save to daily log (key: YYYY-MM-DD)
  const tk = todayKey();
  let dailyLog = JSON.parse(localStorage.getItem('ca_daily')||'{}');
  if(!dailyLog[tk]) dailyLog[tk]={};
  dailyLog[tk][selectedId] = (dailyLog[tk][selectedId]||0) + elapsed;
  localStorage.setItem('ca_daily', JSON.stringify(dailyLog));
  save(); renderLog();
  toast(`Auto-saved ${fmt(elapsed)} for ${s.short}`);
  // Reset elapsed for next session segment
  elapsed = 0;
  startTs = Date.now();
  document.getElementById('timer-num').textContent = '00:00:00';
}

function resetTimer() {
  // If running, auto-save current segment first
  if(running) {
    clearInterval(timerInt);
    running = false;
    if(elapsed > 10) autoSave();
  } else {
    // If paused, any unsaved segment gets discarded (already saved on pause)
  }
  elapsed = 0;
  document.getElementById('timer-num').textContent = '00:00:00';
  document.getElementById('start-btn').textContent = 'Start';
  document.getElementById('timer-subj').textContent = selectedId ? SUBJECTS.find(x=>x.id===selectedId).name : 'Select a subject below';
}

function renderLog() {
  const el = document.getElementById('log-list');
  const today = sessions.slice(-10).reverse();
  if(!today.length){el.innerHTML='<div class="empty-msg">No sessions yet — start studying!</div>';return;}
  el.innerHTML = today.map(s=>{
    const sub=SUBJECTS.find(x=>x.id===s.id);
    return `<div class="log-item">
      <div class="log-left"><div class="log-dot" style="background:${sub.color}"></div><div class="log-name">${sub.short}</div></div>
      <div class="log-right">${fmt(s.secs)} · ${s.time}</div>
    </div>`;
  }).join('');
}

// Planner
function renderPlanSelect() {
  document.getElementById('plan-subj').innerHTML = SUBJECTS.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
}

function addPlan() {
  const sid = document.getElementById('plan-subj').value;
  const topic = document.getElementById('plan-input').value.trim();
  if(!topic){toast("Enter a topic name");return;}
  plans.push({uid:Date.now(), sid, topic, done:false});
  document.getElementById('plan-input').value='';
  save(); renderPlan();
  toast("Added to plan");
}

function togglePlan(uid) {
  const p=plans.find(x=>x.uid===uid);
  if(p) { p.done=!p.done; save(); renderPlan(); }
}

function deletePlan(uid) {
  plans=plans.filter(x=>x.uid!==uid);
  save(); renderPlan();
}

function renderPlan() {
  const el=document.getElementById('plan-list');
  const recent=plans.slice(-20);
  if(!recent.length){el.innerHTML='<div class="empty-msg">Nothing planned yet — add a topic below</div>';return;}
  el.innerHTML=recent.map(p=>{
    const sub=SUBJECTS.find(x=>x.id===p.sid);
    return `<div class="plan-item${p.done?' done':''}">
      <div class="check-box${p.done?' checked':''}" onclick="togglePlan(${p.uid})">
        ${p.done?'<span class="check-icon">✓</span>':''}
      </div>
      <div class="plan-info">
        <div class="plan-topic">${p.topic}</div>
        <div class="plan-tag" style="color:${sub.color}">${sub.name}</div>
      </div>
      <button class="plan-del" onclick="deletePlan(${p.uid})">×</button>
    </div>`;
  }).join('');
}

// Stats
function todayKey() {
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function renderStats() {
  // Load daily log — DO NOT re-add sessions here, saving happens in autoSave only
  let dailyLog = JSON.parse(localStorage.getItem('ca_daily') || '{}');
  const tk = todayKey();

  const totalSecs = Object.values(hours).reduce((a,b)=>a+b,0);
  const todaySecs = sessions.reduce((a,b)=>a+b.secs,0);
  const done = plans.filter(p=>p.done).length;
  const total = plans.length;
  const streak = calcStreak(dailyLog);

  // Stat cards
  document.getElementById('stat-cards').innerHTML=`
    <div class="stat-box"><div class="stat-val accent">${(totalSecs/3600).toFixed(1)}</div><div class="stat-lbl">Total hours</div></div>
    <div class="stat-box"><div class="stat-val green">${(todaySecs/3600).toFixed(1)}</div><div class="stat-lbl">Today's hours</div></div>
    <div class="stat-box"><div class="stat-val amber">${streak}</div><div class="stat-lbl">Day streak 🔥</div></div>
    <div class="stat-box"><div class="stat-val">${done}/${total}</div><div class="stat-lbl">Tasks done</div></div>`;

  // Today subject breakdown
  const todayData = dailyLog[tk] || {};
  const maxToday = Math.max(...SUBJECTS.map(s=>todayData[s.id]||0), 1);
  document.getElementById('today-bars').innerHTML = SUBJECTS.map(s=>{
    const h = todayData[s.id]||0;
    const pct = Math.round((h/maxToday)*100);
    const hrsStr = h>0 ? (h/3600).toFixed(1)+'h' : '—';
    return `<div class="bar-item">
      <div class="bar-top"><span class="bar-name">${s.name}</span><span class="bar-hrs" style="color:${h>0?s.color:'var(--muted)'}">${hrsStr}</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${s.color}"></div></div>
    </div>`;
  }).join('');

  // Last 7 days daily chart
  const days7 = getLast7Days();
  const maxDay = Math.max(...days7.map(d=>{
    const dd = dailyLog[d.key]||{};
    return Object.values(dd).reduce((a,b)=>a+b,0);
  }), 1);

  document.getElementById('daily-chart').innerHTML = `
    <div style="display:flex;align-items:flex-end;gap:8px;height:100px;margin-bottom:8px;">
      ${days7.map(d=>{
        const dd = dailyLog[d.key]||{};
        const secs = Object.values(dd).reduce((a,b)=>a+b,0);
        const pct = Math.round((secs/maxDay)*100);
        const isToday = d.key===tk;
        return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;">
          <div style="font-size:10px;color:var(--muted)">${secs>0?(secs/3600).toFixed(1):''}h</div>
          <div style="width:100%;background:${isToday?'#4f8ef7':'#34c77b'};border-radius:4px 4px 0 0;height:${Math.max(pct,secs>0?8:2)}%;opacity:${isToday?1:0.7};min-height:${secs>0?'6px':'2px'}"></div>
        </div>`;
      }).join('')}
    </div>
    <div style="display:flex;gap:8px;">
      ${days7.map(d=>`<div style="flex:1;text-align:center;font-size:10px;color:${d.key===tk?'var(--accent)':'var(--muted)'};font-weight:${d.key===tk?'600':'400'}">${d.label}</div>`).join('')}
    </div>`;

  // Day-wise detail cards
  const recentDays = days7.filter(d=>dailyLog[d.key] && Object.values(dailyLog[d.key]).some(v=>v>0)).reverse();
  if(recentDays.length===0){
    document.getElementById('day-detail').innerHTML='<div class="empty-msg">No history yet — start studying!</div>';
  } else {
    document.getElementById('day-detail').innerHTML = recentDays.map(d=>{
      const dd = dailyLog[d.key]||{};
      const totalH = Object.values(dd).reduce((a,b)=>a+b,0);
      const studied = SUBJECTS.filter(s=>(dd[s.id]||0)>0);
      return `<div style="background:var(--surface);border:0.5px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
          <div style="font-size:14px;font-weight:600;color:${d.key===tk?'var(--accent)':'var(--text)'}">${d.key===tk?'Today':d.full}</div>
          <div style="font-size:15px;font-weight:700;color:var(--green)">${(totalH/3600).toFixed(1)}h total</div>
        </div>
        ${studied.map(s=>{
          const h=dd[s.id]||0;
          const pct=Math.round((h/totalH)*100);
          return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
            <div style="width:8px;height:8px;border-radius:50%;background:${s.color};flex-shrink:0"></div>
            <div style="font-size:13px;flex:1;color:var(--text)">${s.name}</div>
            <div style="font-size:13px;font-weight:600;color:${s.color}">${(h/3600).toFixed(1)}h</div>
            <div style="font-size:11px;color:var(--muted);width:30px;text-align:right">${pct}%</div>
          </div>`;
        }).join('')}
      </div>`;
    }).join('');
  }

  // All-time bars
  const maxH = Math.max(...SUBJECTS.map(s=>hours[s.id]||0),1);
  document.getElementById('bar-chart').innerHTML = SUBJECTS.map(s=>{
    const h=hours[s.id]||0;
    const pct=Math.round((h/maxH)*100);
    return `<div class="bar-item">
      <div class="bar-top"><span class="bar-name">${s.name}</span><span class="bar-hrs">${(h/3600).toFixed(1)}h</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${s.color}"></div></div>
    </div>`;
  }).join('');
}

function getLast7Days() {
  const days = [];
  const labels = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  for(let i=6;i>=0;i--){
    const d = new Date();
    d.setDate(d.getDate()-i);
    const key = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    const full = d.toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'short'});
    days.push({key, label:labels[d.getDay()], full});
  }
  return days;
}

function calcStreak(dailyLog) {
  let streak = 0;
  const d = new Date();
  while(true){
    const key = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    const dd = dailyLog[key]||{};
    const secs = Object.values(dd).reduce((a,b)=>a+b,0);
    if(secs > 600) { streak++; d.setDate(d.getDate()-1); }
    else break;
  }
  return streak;
}
